title = "SDC"
baseURL = "https://sdc.migracode.org/"

[module]
  [[module.imports]]
    path = "github.com/CodeYourFuture/curriculum/common-theme"
  # These guides are currently a mix of CYF-specific and general - we probably want to split these up so Migracode are only depending on the common pieces...
  [[module.imports]]
    path = "github.com/CodeYourFuture/curriculum/org-cyf-guides"
    [[module.imports.mounts]]
      source = "content"
      target = "content/guides"
  [[module.imports]]
    path = "github.com/CodeYourFuture/curriculum/common-content"


[params]
# Our default custom params eg where our stuff is and what it is called
description = "A free and open source software development programme."
main_website = "https://migracode.org/"
main_org_name = "Migracode Barcelona"
our_name = "Migracode"
# TODO: Replace these with Migracode-Barcelona when the repos exist.
owner = "CodeYourFuture"
org = "https://github.com/CodeYourFuture"
repo = "https://github.com/Migracode-Barcelona/curriculum3.0/"
root = "curriculum3.0"
googleFonts="https://fonts.googleapis.com/css2?family=Jura:wght@400;600;700&family=Inter:wght@400;500;700&family=Noto+Color+Emoji&family=Raleway:wght@300;600;800;900&family=Lato:wght@500;800&display=swap"

[markup]
# I've configured markdown so you don't have to
  [markup.tableOfContents]
    endLevel = 2
    ordered = true
    startLevel = 2
    [markup.goldmark.renderer]
# Enable HTML codeblocks, e.g. for <details> blocks
      unsafe = true
#this makes the section nav go the right way
# because of this 'unexpected behaviour' https://gohugo.io/methods/page/nextinsection/
[page]
  nextPrevInSectionSortOrder = 'asc'
  nextPrevSortOrder = 'asc'
